<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bookGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4facfe"/>
      <stop offset="100%" stop-color="#00f2fe"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bookGrad2)"/>

  <!-- Book icon with data theme -->
  <g transform="translate(200, 150)">
    <!-- Book cover -->
    <rect x="-60" y="-70" width="120" height="140" rx="4" fill="white" opacity="0.95"/>
    <!-- Book spine shadow -->
    <rect x="-60" y="-70" width="8" height="140" fill="rgba(0,0,0,0.1)"/>
    <!-- Pages -->
    <rect x="-52" y="-65" width="104" height="130" fill="#f8f9fa"/>
    <!-- Database icon on cover -->
    <g transform="translate(0, -20)">
      <ellipse cx="0" cy="-15" rx="30" ry="10" fill="none" stroke="#4facfe" stroke-width="3" opacity="0.7"/>
      <line x1="-30" y1="-15" x2="-30" y2="5" stroke="#4facfe" stroke-width="3" opacity="0.7"/>
      <line x1="30" y1="-15" x2="30" y2="5" stroke="#4facfe" stroke-width="3" opacity="0.7"/>
      <ellipse cx="0" cy="5" rx="30" ry="10" fill="none" stroke="#4facfe" stroke-width="3" opacity="0.7"/>
      <ellipse cx="0" cy="25" rx="30" ry="10" fill="none" stroke="#4facfe" stroke-width="3" opacity="0.7"/>
      <line x1="-30" y1="5" x2="-30" y2="25" stroke="#4facfe" stroke-width="3" opacity="0.7"/>
      <line x1="30" y1="5" x2="30" y2="25" stroke="#4facfe" stroke-width="3" opacity="0.7"/>
    </g>
  </g>
</svg>
