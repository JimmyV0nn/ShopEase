<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="headphones-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#headphones-bg)"/>
  <!-- Headphones icon -->
  <g transform="translate(200, 150)">
    <!-- Headband -->
    <path d="M -60 -20 Q -60 -60, 0 -60 Q 60 -60, 60 -20"
          stroke="#fff" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Left ear cup -->
    <rect x="-70" y="-30" width="30" height="50" rx="10" fill="#fff"/>
    <!-- Right ear cup -->
    <rect x="40" y="-30" width="30" height="50" rx="10" fill="#fff"/>
    <!-- Sound waves left -->
    <path d="M -85 -5 Q -95 -5, -95 -5" stroke="#fff" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
    <path d="M -85 5 Q -95 5, -95 5" stroke="#fff" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
    <!-- Sound waves right -->
    <path d="M 85 -5 Q 95 -5, 95 -5" stroke="#fff" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
    <path d="M 85 5 Q 95 5, 95 5" stroke="#fff" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
  </g>
</svg>