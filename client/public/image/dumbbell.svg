<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="dumbbellGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fa709a"/>
      <stop offset="100%" stop-color="#fee140"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#dumbbellGrad)"/>

  <!-- Dumbbell icon -->
  <g transform="translate(200, 150)">
    <!-- Left weight -->
    <rect x="-90" y="-25" width="30" height="50" rx="4" fill="white" opacity="0.95"/>
    <rect x="-85" y="-30" width="20" height="60" rx="3" fill="white" opacity="0.9"/>
    <!-- Left connector -->
    <rect x="-60" y="-8" width="20" height="16" rx="2" fill="white" opacity="0.95"/>
    <!-- Handle -->
    <rect x="-40" y="-12" width="80" height="24" rx="12" fill="white" opacity="0.95"/>
    <!-- Handle grip lines -->
    <line x1="-25" y1="-8" x2="-25" y2="8" stroke="#fa709a" stroke-width="2" opacity="0.3"/>
    <line x1="-15" y1="-8" x2="-15" y2="8" stroke="#fa709a" stroke-width="2" opacity="0.3"/>
    <line x1="-5" y1="-8" x2="-5" y2="8" stroke="#fa709a" stroke-width="2" opacity="0.3"/>
    <line x1="5" y1="-8" x2="5" y2="8" stroke="#fa709a" stroke-width="2" opacity="0.3"/>
    <line x1="15" y1="-8" x2="15" y2="8" stroke="#fa709a" stroke-width="2" opacity="0.3"/>
    <line x1="25" y1="-8" x2="25" y2="8" stroke="#fa709a" stroke-width="2" opacity="0.3"/>
    <!-- Right connector -->
    <rect x="40" y="-8" width="20" height="16" rx="2" fill="white" opacity="0.95"/>
    <!-- Right weight -->
    <rect x="60" y="-25" width="30" height="50" rx="4" fill="white" opacity="0.95"/>
    <rect x="65" y="-30" width="20" height="60" rx="3" fill="white" opacity="0.9"/>
  </g>
</svg>
