  <line x1="144" y1="93" x2="144" y2="202" stroke="#8B5E3C" stroke-width="2" opacity="0.4"/>
  <line x1="166" y1="93" x2="166" y2="202" stroke="#8B5E3C" stroke-width="2" opacity="0.4"/>
  <line x1="188" y1="93" x2="188" y2="202" stroke="#8B5E3C" stroke-width="2" opacity="0.4"/>
  <line x1="210" y1="93" x2="210" y2="202" stroke="#8B5E3C" stroke-width="2" opacity="0.4"/>
  <line x1="232" y1="93" x2="232" y2="202" stroke="#8B5E3C" stroke-width="2" opacity="0.4"/>
