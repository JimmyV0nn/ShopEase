  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Large board -->
  <rect x="95" y="85" width="155" height="125" rx="10" fill="#8B5E3C"/>
  <rect x="103" y="93" width="139" height="109" rx="7" fill="#C4874F"/>
