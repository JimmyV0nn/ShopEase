<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="jacketGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#30cfd0"/>
      <stop offset="100%" stop-color="#330867"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#jacketGrad)"/>

  <!-- Jacket icon -->
  <g transform="translate(200, 150)">
    <!-- Left side of jacket -->
    <path d="M -50,-60 L -70,-40 L -70,50 L -30,50 L -30,-40 L -40,-60 Z" fill="white" opacity="0.95"/>
    <!-- Right side of jacket -->
    <path d="M 50,-60 L 70,-40 L 70,50 L 30,50 L 30,-40 L 40,-60 Z" fill="white" opacity="0.95"/>
    <!-- Collar left -->
    <path d="M -40,-60 L -30,-40 L -10,-50 L -20,-65 Z" fill="white" opacity="0.9"/>
    <!-- Collar right -->
    <path d="M 40,-60 L 30,-40 L 10,-50 L 20,-65 Z" fill="white" opacity="0.9"/>
    <!-- Zipper -->
    <line x1="0" y1="-45" x2="0" y2="50" stroke="#30cfd0" stroke-width="3" opacity="0.4"/>
    <circle cx="0" cy="-40" r="4" fill="#30cfd0" opacity="0.5"/>
    <!-- Pockets -->
    <rect x="-55" y="10" width="20" height="18" rx="2" fill="none" stroke="#30cfd0" stroke-width="2" opacity="0.3"/>
    <rect x="35" y="10" width="20" height="18" rx="2" fill="none" stroke="#30cfd0" stroke-width="2" opacity="0.3"/>
  </g>
</svg>
