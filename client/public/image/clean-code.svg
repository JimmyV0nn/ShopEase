<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bookGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bookGrad1)"/>

  <!-- Book icon -->
  <g transform="translate(200, 150)">
    <!-- Book cover -->
    <rect x="-60" y="-70" width="120" height="140" rx="4" fill="white" opacity="0.95"/>
    <!-- Book spine shadow -->
    <rect x="-60" y="-70" width="8" height="140" fill="rgba(0,0,0,0.1)"/>
    <!-- Pages -->
    <rect x="-52" y="-65" width="104" height="130" fill="#f8f9fa"/>
    <!-- Book details -->
    <rect x="-40" y="-50" width="80" height="4" rx="2" fill="#667eea" opacity="0.6"/>
    <rect x="-40" y="-38" width="60" height="3" rx="1.5" fill="#667eea" opacity="0.4"/>
    <rect x="-40" y="-28" width="70" height="3" rx="1.5" fill="#667eea" opacity="0.4"/>
    <!-- Code symbol -->
    <text x="0" y="20" font-family="monospace" font-size="48" fill="#667eea" text-anchor="middle" font-weight="bold">&lt;/&gt;</text>
  </g>
</svg>
