<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="shirtGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9a9e"/>
      <stop offset="100%" stop-color="#fecfef"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#shirtGrad)"/>

  <!-- Shirt icon -->
  <g transform="translate(200, 150)">
    <!-- Main body -->
    <rect x="-50" y="-20" width="100" height="80" rx="4" fill="white" opacity="0.95"/>
    <!-- Sleeves -->
    <path d="M -50,-20 L -80,-10 L -75,25 L -50,20 Z" fill="white" opacity="0.95"/>
    <path d="M 50,-20 L 80,-10 L 75,25 L 50,20 Z" fill="white" opacity="0.95"/>
    <!-- Collar -->
    <path d="M -20,-20 L -30,-45 L -10,-50 L 0,-30 Z" fill="white" opacity="0.95"/>
    <path d="M 20,-20 L 30,-45 L 10,-50 L 0,-30 Z" fill="white" opacity="0.95"/>
    <!-- Button line -->
    <line x1="0" y1="-20" x2="0" y2="60" stroke="#ff9a9e" stroke-width="2" opacity="0.3"/>
    <!-- Buttons -->
    <circle cx="0" cy="-10" r="3" fill="#ff9a9e" opacity="0.5"/>
    <circle cx="0" cy="5" r="3" fill="#ff9a9e" opacity="0.5"/>
    <circle cx="0" cy="20" r="3" fill="#ff9a9e" opacity="0.5"/>
    <circle cx="0" cy="35" r="3" fill="#ff9a9e" opacity="0.5"/>
    <circle cx="0" cy="50" r="3" fill="#ff9a9e" opacity="0.5"/>
    <!-- Pocket -->
    <rect x="-30" y="0" width="20" height="18" rx="2" fill="none" stroke="#ff9a9e" stroke-width="2" opacity="0.3"/>
  </g>
</svg>
