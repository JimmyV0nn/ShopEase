<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="kettleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a8edea"/>
      <stop offset="100%" stop-color="#fed6e3"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#kettleGrad)"/>

  <!-- Kettle icon -->
  <g transform="translate(200, 150)">
    <!-- Kettle body -->
    <ellipse cx="0" cy="35" rx="55" ry="15" fill="white" opacity="0.95"/>
    <path d="M -55,35 L -45,-30 L 45,-30 L 55,35 Z" fill="white" opacity="0.95"/>
    <ellipse cx="0" cy="-30" rx="45" ry="12" fill="white" opacity="0.9"/>
    <!-- Lid -->
    <ellipse cx="0" cy="-30" rx="20" ry="8" fill="white" opacity="0.95"/>
    <rect x="-8" y="-48" width="16" height="20" rx="8" fill="white" opacity="0.95"/>
    <!-- Handle -->
    <path d="M 55,10 Q 85,10 85,-10 Q 85,-30 65,-30" fill="none" stroke="white" stroke-width="8" opacity="0.95" stroke-linecap="round"/>
    <!-- Spout -->
    <path d="M -55,15 L -75,5 L -75,25 Z" fill="white" opacity="0.95"/>
    <!-- Shine effect -->
    <ellipse cx="-15" cy="-10" rx="8" ry="25" fill="white" opacity="0.3"/>
  </g>
</svg>
