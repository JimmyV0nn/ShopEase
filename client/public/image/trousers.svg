<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="trousersGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#43e97b"/>
      <stop offset="100%" stop-color="#38f9d7"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#trousersGrad)"/>

  <!-- Trousers icon -->
  <g transform="translate(200, 150)">
    <!-- Waistband -->
    <rect x="-55" y="-65" width="110" height="12" rx="2" fill="white" opacity="0.95"/>
    <!-- Belt loops -->
    <rect x="-45" y="-68" width="6" height="8" rx="1" fill="white" opacity="0.9"/>
    <rect x="-3" y="-68" width="6" height="8" rx="1" fill="white" opacity="0.9"/>
    <rect x="39" y="-68" width="6" height="8" rx="1" fill="white" opacity="0.9"/>
    <!-- Left leg -->
    <path d="M -55,-53 L -45,60 L -15,60 L -10,-53 Z" fill="white" opacity="0.95"/>
    <!-- Right leg -->
    <path d="M 10,-53 L 15,60 L 45,60 L 55,-53 Z" fill="white" opacity="0.95"/>
    <!-- Center seam -->
    <line x1="0" y1="-53" x2="0" y2="10" stroke="#43e97b" stroke-width="2" opacity="0.3"/>
    <!-- Pockets -->
    <path d="M -40,-45 Q -35,-35 -40,-25" fill="none" stroke="#43e97b" stroke-width="2" opacity="0.4"/>
    <path d="M 40,-45 Q 35,-35 40,-25" fill="none" stroke="#43e97b" stroke-width="2" opacity="0.4"/>
    <!-- Back pocket detail -->
    <rect x="20" y="-25" width="18" height="20" rx="2" fill="none" stroke="#43e97b" stroke-width="2" opacity="0.3"/>
  </g>
</svg>
