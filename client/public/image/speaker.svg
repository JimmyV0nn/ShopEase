<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="speakerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f77062"/>
      <stop offset="100%" stop-color="#fe5196"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#speakerGrad)"/>

  <!-- Speaker icon -->
  <g transform="translate(200, 150)">
    <!-- Speaker body -->
    <rect x="-50" y="-70" width="100" height="140" rx="8" fill="white" opacity="0.95"/>
    <!-- Top speaker (tweeter) -->
    <circle cx="0" cy="-35" r="18" fill="none" stroke="#f77062" stroke-width="3" opacity="0.6"/>
    <circle cx="0" cy="-35" r="10" fill="none" stroke="#f77062" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="-35" r="4" fill="#f77062" opacity="0.4"/>
    <!-- Bottom speaker (woofer) -->
    <circle cx="0" cy="25" r="35" fill="none" stroke="#f77062" stroke-width="4" opacity="0.6"/>
    <circle cx="0" cy="25" r="25" fill="none" stroke="#f77062" stroke-width="3" opacity="0.5"/>
    <circle cx="0" cy="25" r="15" fill="none" stroke="#f77062" stroke-width="2" opacity="0.4"/>
    <circle cx="0" cy="25" r="8" fill="#f77062" opacity="0.3"/>
    <!-- Grille pattern -->
    <circle cx="-15" cy="10" r="2" fill="#f77062" opacity="0.2"/>
    <circle cx="15" cy="10" r="2" fill="#f77062" opacity="0.2"/>
    <circle cx="-15" cy="40" r="2" fill="#f77062" opacity="0.2"/>
    <circle cx="15" cy="40" r="2" fill="#f77062" opacity="0.2"/>
  </g>
</svg>
